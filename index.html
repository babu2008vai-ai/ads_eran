<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM Earn BD</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 🔗 আপনার সুপ্রাবেস প্রজেক্ট লিংক এখানে সেট করা হলো
        const SUPABASE_URL = "https://dmvkwenjlsbkbyvgbxil.supabase.co";

        // 🔑 আপনার সুপ্রাবেস থেকে আনা Anon Key-টি নিচে দেওয়া হলো
        const SUPABASE_KEY = "sb_publishable_wgBfBbb6WkltJQdNcR2B5A_tz";

        // 🚀 সুপ্রাবেস ক্লায়েন্ট তৈরি
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background-color: #0b111e;
            color: #ffffff;
            padding-bottom: 90px;
        }
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #3b82f6;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .logo-container {
            margin-bottom: 10px;
        }
        .logo-container img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
        }
        .app-title {
            font-size: 24px;
            font-weight: bold;
            color: #3b82f6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        .balance-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .balance-label {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            color: #10b981;
            margin: 10px 0;
        }
        .withdraw-btn {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .withdraw-btn:active {
            transform: scale(0.95);
        }
        .task-section {
            padding: 0 20px;
        }
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .task-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .task-info h4 {
            font-size: 16px;
            color: #f8fafc;
            margin-bottom: 4px;
        }
        .task-info p {
            font-size: 13px;
            color: #10b981;
            font-weight: 500;
        }
        .claim-btn {
            background: #334155;
            color: #f8fafc;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .claim-btn.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            cursor: not-allowed;
        }
        
        /* Modal Style (Withdraw Window) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1e293b;
            border: 2px solid #3b82f6;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
        }
        .close-modal-btn:hover {
            color: #ef4444;
        }
        .modal-title {
            font-size: 20px;
            color: #3b82f6;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        .input-group input, .input-group select {
            width: 100%;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #3b82f6;
        }
        .submit-withdraw-btn {
            width: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0f172a;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 900;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-item.active {
            color: #3b82f6;
        }
        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <img src="https://via.placeholder.com/150" alt="HM Logo">
        </div>
        <div class="app-title">HM Earn BD</div>
    </div>

    <div id="main-content">
        <div class="balance-card">
            <div class="balance-label">Your Total Balance</div>
            <div class="balance-amount"><span id="user-balance">0.00</span> ৳</div>
            <button class="withdraw-btn" onclick="openWithdrawModal()">💳 Withdraw</button>
        </div>

        <div class="task-section">
            <div class="section-title">🚀 Available Tasks</div>
            
            <div class="task-card">
                <div class="task-info">
                    <h4>Daily Check-in</h4>
                    <p>+5.00 ৳</p>
                </div>
                <button class="claim-btn" id="task1-btn" onclick="claimReward(5.00, 'task1-btn')">Claim</button>
            </div>

            <div class="task-card">
                <div class="task-info">
                    <h4>Watch Video Ad</h4>
                    <p>+2.00 ৳</p>
                </div>
                <button class="claim-btn" id="task2-btn" onclick="claimReward(2.00, 'task2-btn')">Claim</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="withdraw-modal">
        <div class="modal-content">
            <button class="close-modal-btn" onclick="closeWithdrawModal()">×</button>
            <div class="modal-title">Withdraw Money</div>
            
            <div class="input-group">
                <label for="method">Select Method</label>
                <select id="method">
                    <option value="bKash">bKash</option>
                    <option value="Nagad">Nagad</option>
                    <option value="Rocket">Rocket</option>
                </select>
            </div>

            <div class="input-group">
                <label for="number">Account Number</label>
                <input type="number" id="number" placeholder="017XXXXXXXX">
            </div>

            <div class="input-group">
                <label for="amount">Amount (৳)</label>
                <input type="number" id="amount" placeholder="Minimum 50 ৳">
            </div>

            <button class="submit-withdraw-btn" onclick="processWithdraw()">Submit Request</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')">
            <span>🏠 Home</span>
        </div>
        <div class="nav-item" onclick="openWithdrawModal()">
            <span>💳 Withdraw</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile')">
            <span>👤 Profile</span>
        </div>
    </div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজ করা
        const tg = window.Telegram.WebApp;
        tg.expand(); // অ্যাপটি পুরো স্ক্রিনে ওপেন করার জন্য

        let currentBalance = 0.00;

        // ব্যালেন্স আপডেট করার ফাংশন
        function updateBalanceDisplay() {
            document.getElementById('user-balance').innerText = currentBalance.toFixed(2);
        }

        // টাস্ক রিওয়ার্ড মেকানিজম
        function claimReward(amount, buttonId) {
            const btn = document.getElementById(buttonId);
            if (btn.classList.contains('completed')) return;

            currentBalance += amount;
            updateBalanceDisplay();

            // বাটন লক করা যেন বারবার ক্লিক না করতে পারে
            btn.innerText = "Completed";
            btn.classList.add('completed');
            btn.disabled = true;

            tg.HapticFeedback.notificationOccurred('success');
            alert(`সফলভাবে ${amount} ৳ আপনার ব্যালেন্সে যোগ হয়েছে!`);
        }

        // উইড্র পপ-আপ ওপেন করার ফাংশন
        function openWithdrawModal() {
            document.getElementById('withdraw-modal').style.display = 'flex';
        }

        // উইড্র পপ-আপ ক্লোজ করার ফাংশন (Bug Fixed ✅)
        function closeWithdrawModal() {
            document.getElementById('withdraw-modal').style.display = 'none';
        }

        // উইড্র সাবমিট করার প্রসেস
        function processWithdraw() {
            const method = document.getElementById('method').value;
            const number = document.getElementById('number').value;
            const amount = parseFloat(document.getElementById('amount').value);

            if (!number || isNaN(amount)) {
                alert('অনুগ্রহ করে সঠিক নম্বর এবং অ্যামাউন্ট দিন!');
                return;
            }

            if (amount < 50) {
                alert('দুঃখিত, সর্বনিম্ন উইড্র অ্যামাউন্ট ৫০ ৳!');
                return;
            }

            if (amount > currentBalance) {
                alert('আপনার অ্যাকাউন্টে পর্যাপ্ত ব্যালেন্স নেই!');
                return;
            }

            // ব্যালেন্স কেটে নেওয়া
            currentBalance -= amount;
            updateBalanceDisplay();
            
            closeWithdrawModal();
            tg.HapticFeedback.notificationOccurred('success');
            
            alert(`আপনার ${amount} ৳ উইড্র রিকোয়েস্টটি (${method}) নম্বরে সফলভাবে পাঠানো হয়েছে। ২৪ ঘণ্টার মধ্যে পেমেন্ট পেয়ে যাবেন। ধন্যবাদ!`);
            
            // ইনপুট ফিল্ড খালি করা
            document.getElementById('number').value = '';
            document.getElementById('amount').value = '';
        }

        // ট্যাব সুইচিং নেভিগেশন (ডেমো)
        function switchTab(tabName) {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            
            if (tabName === 'home') {
                navItems[0].classList.add('active');
            } else if (tabName === 'profile') {
                navItems[2].classList.add('active');
                alert('প্রোফাইল সেকশনটি আপনার ডাটাবেজের সাথে পরবর্তীতে আরও কাস্টমাইজ করা যাবে।');
            }
        }

        // অ্যাপ লোড হওয়ার সাথে সাথে স্ক্রিন রিফ্রেশ
        updateBalanceDisplay();
    </script>
</body>
</html>
